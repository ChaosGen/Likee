<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рыбалка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        /* Контейнер строго 704x1406 */
        #game-scaler {
            position: relative;
            width: 704px;
            height: 1406px;
            background-image: url('fon.png');
            background-size: 100% 100%;
            overflow: hidden;
            flex-shrink: 0;
        }

        canvas {
            display: block;
            background: transparent;
        }

        /* Элементы управления внутри фиксированного поля */
        .cannon-node {
            position: absolute;
            width: 70px;
            height: 70px;
            background: rgba(30, 41, 59, 0.85);
            border: 3px solid #94a3b8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            transition: transform 0.2s;
        }
        .cannon-node.active {
            border-color: #fbbf24;
            box-shadow: 0 0 20px #fbbf24;
            transform: scale(1.1);
        }

        #cannon-left { left: 10px; top: 50%; transform: translateY(-50%); }
        #cannon-right { right: 10px; top: 50%; transform: translateY(-50%); }
        #cannon-bottom { bottom: 30px; left: 50%; transform: translateX(-50%); }

        .stat-panel {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 15px;
            border: 2px solid #fbbf24;
            color: #fbbf24;
            font-size: 32px;
            font-weight: bold;
            z-index: 30;
        }

        .controls {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 20px; 
            border-radius: 40px;
            z-index: 30;
        }

        .btn {
            width: 44px; 
            height: 44px; 
            background: #ef4444;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 26px; 
            font-weight: bold;
        }
        .btn-plus { background: #10b981; }
        .gear-text { color: white; font-size: 24px; font-weight: bold; }
        .cannon-sprite {
            position: absolute;
            z-index: 25;
            width: 200px; 
            height: auto;
            pointer-events: none;
            transition: left 0.15s, right 0.15s, top 0.15s, transform 0.15s;
            transform-origin: 50% 50%;
        }
        .cannon-pos-left { left: 10px; top: 50%; transform: translateY(-50%) rotate(90deg); }
        .cannon-pos-right { right: 10px; top: 50%; transform: translateY(-50%) rotate(-90deg); }
        .cannon-pos-bottom { left: 50%; bottom: 30px; transform: translateX(-50%) rotate(0deg); top: auto; right: auto; }

    </style>
    </head>
    <body>
 
    <div id="game-scaler">
        <div class="stat-panel">💎 <span id="score">0</span></div>
 
        <div class="controls" style="gap:8px;">
            <!-- Кнопки переключения снарядов: переходят по списку [1,5,10,20,50,200,500,1000] -->
            <div class="btn" onclick="event.stopPropagation(); changeAmmo(-1)">−</div>
            <div class="gear-text">СНАРЯД: <span id="gear">1</span></div>
            <div class="btn btn-plus" onclick="event.stopPropagation(); changeAmmo(1)">+</div>
        </div>
 
        <div class="cannon-node" id="cannon-left" onclick="moveCannon('left', event)">
         </div>
         <div class="cannon-node" id="cannon-bottom" onclick="moveCannon('bottom', event)">
         </div>
         <div class="cannon-node" id="cannon-right" onclick="moveCannon('right', event)">
         </div>
 
         <img id="cannonSprite" src="P1.png" class="cannon-sprite cannon-pos-bottom" alt="cannon">
 
        <canvas id="gameCanvas"></canvas>
    </div>
 
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scaler = document.getElementById('game-scaler');
        const scoreEl = document.getElementById('score');
        const gearEl = document.getElementById('gear');
 
        const GAME_WIDTH = 704;
        const GAME_HEIGHT = 1406;
 
        let score = 0;
        let gearLevel = 1;
        let fishes = [];
        let bullets = [];
        let particles = [];
        let selectedCannon = 'bottom';
 
        // Логика размеров и весов
        const fishData = [
            { id: 'fish1', val: 1, chance: 0.7, size: 100, spawnWeight: 100 },
            { id: 'fish2', val: 1, chance: 0.7, size: 55, spawnWeight: 100 },
            { id: 'fish3', val: 2, chance: 0.5, size: 85, spawnWeight: 80 },
            { id: 'fish4', val: 2, chance: 0.5, size: 100, spawnWeight: 80 },
            { id: 'fish5', val: 2, chance: 0.5, size: 85, spawnWeight: 80 },
            { id: 'fish6', val: 3, chance: 0.4, size: 75, spawnWeight: 60 },
            { id: 'fish7', val: 3, chance: 0.35, size: 100, spawnWeight: 60 },
            { id: 'fish8', val: 4, chance: 0.3, size: 90, spawnWeight: 50 },
            { id: 'fish9', val: 4, chance: 0.25, size: 130, spawnWeight: 40 },
            { id: 'fish10', val: 5, chance: 0.2, size: 145, spawnWeight: 40 },
            { id: 'fish11', val: 5, chance: 0.15, size: 170, spawnWeight: 30 },
            { id: 'fish15', val: 5, chance: 0.2, size: 155, spawnWeight: 35 },
            { id: 'fish12', val: 8, chance: 0.1, size: 85, gold: true, spawnWeight: 15 },
            { id: 'fish13', val: 10, chance: 0.08, size: 110, gold: true, spawnWeight: 12 },
            { id: 'fish16', val: 12, chance: 0.05, size: 210, spawnWeight: 8 },
            { id: 'fish14', val: 12, chance: 0.05, size: 190, gold: true, spawnWeight: 10 },
            { id: 'fish17', val: 30, chance: 0.02, size: 250, spawnWeight: 3 }, 
            { id: 'fish18', val: 40, chance: 0.01, size: 280, spawnWeight: 1 }
        ];
 
        const sizeOverrides = {
            "fish1": 0.65,
            "fish2": 1,
            "fish3": 0.85,
            "fish4": 1,
            "fish5": 1.25,
            "fish6": 1.35,
            "fish7": 1.05,
            "fish8": 1.25,
            "fish9": 1.4,
            "fish10": 1.2,
            "fish11": 1.1,
            "fish15": 0.95,
            "fish12": 1.65,
            "fish13": 1.55,
            "fish16": 1.3,
            "fish14": 1.3,
            "fish17": 1.55,
            "fish18": 1.8
        };
 
        const images = {};
        fishData.forEach(f => {
            const img = new Image();
            img.src = `${f.id}.png`;
            images[f.id] = img;
        });
 
        const ammoValues = [1,5,10,20,50,200,500,1000];
        let selectedAmmo = 1;
        const ammoToRadius = { 1:8, 5:10, 10:12, 20:14, 50:16, 200:20, 500:24, 1000:28 };
        const BULLET_RADIUS = ammoToRadius[5] || 10;
        const cannonSprite = document.getElementById('cannonSprite');
        const positionClasses = { left: 'cannon-pos-left', right: 'cannon-pos-right', bottom: 'cannon-pos-bottom' };
        let cannonPosition = 'bottom';
 
        function changeAmmo(d) {
            const idx = ammoValues.indexOf(selectedAmmo);
            let n = idx + (d > 0 ? 1 : -1);
            if (n < 0) n = 0;
            if (n >= ammoValues.length) n = ammoValues.length - 1;
            selectedAmmo = ammoValues[n];
            gearEl.innerText = selectedAmmo;
            cannonSprite.src = `P${selectedAmmo}.png`;
        }
 
        // функция перемещения единственной пушки на одну из трёх позиций
        function moveCannon(pos, e) {
            if (e) e.stopPropagation();
            cannonPosition = pos;
            Object.values(positionClasses).forEach(c => cannonSprite.classList.remove(c));
            cannonSprite.classList.add(positionClasses[pos]);
            document.querySelectorAll('.cannon-node').forEach(el => el.classList.remove('active'));
            const marker = document.getElementById(`cannon-${pos}`);
            if (marker) marker.classList.add('active');
        }
 
        gearEl.innerText = selectedAmmo;
        cannonSprite.src = `P${selectedAmmo}.png`;
        moveCannon(cannonPosition);
 
        // Функция адаптации под экран без изменения 704x1406
        function fitToScreen() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const scale = Math.min(windowWidth / GAME_WIDTH, windowHeight / GAME_HEIGHT);
            scaler.style.transform = `scale(${scale})`;
        }
 
        window.addEventListener('resize', fitToScreen);
        fitToScreen();
 
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
 
        function selectCannon(id, e) {
            e.stopPropagation();
            document.querySelectorAll('.cannon-node').forEach(el => el.classList.remove('active'));
            document.getElementById(`cannon-${id}`).classList.add('active');
            selectedCannon = id;
        }
 
        class Bullet {
            constructor(startX, startY, targetX, targetY) {
                this.x = startX;
                this.y = startY;
                const angle = Math.atan2(targetY - startY, targetX - startX);
                this.vx = Math.cos(angle) * 16;
                this.vy = Math.sin(angle) * 16;
                this.value = selectedAmmo;
                this.radius = BULLET_RADIUS;
                this.active = true;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if(this.x < -20 || this.x > GAME_WIDTH + 20 || this.y < -20 || this.y > GAME_HEIGHT + 20) {
                    this.active = false;
                }
            }
            draw() {
                ctx.save();
                ctx.fillStyle = '#fbbf24';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#fbbf24';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
        }
 
        class Fish {
            constructor() {
                this.init();
            }
            init() {
                const totalWeight = fishData.reduce((sum, f) => sum + f.spawnWeight, 0);
                let random = Math.random() * totalWeight;
                for (const f of fishData) {
                    if (random < f.spawnWeight) {
                        this.type = f;
                        break;
                    }
                    random -= f.spawnWeight;
                }
    
                this.size = this.type.size;
                this.darken = 0;
                this.displaySize = this.size;
    
                const side = Math.floor(Math.random() * 4);
                if (side === 0) { this.x = -this.size; this.y = Math.random() * GAME_HEIGHT; }
                else if (side === 1) { this.x = GAME_WIDTH + this.size; this.y = Math.random() * GAME_HEIGHT; }
                else if (side === 2) { this.x = Math.random() * GAME_WIDTH; this.y = -this.size; }
                else { this.x = Math.random() * GAME_WIDTH; this.y = GAME_HEIGHT + this.size; }
    
                const targetX = Math.random() * GAME_WIDTH;
                const targetY = Math.random() * GAME_HEIGHT;
                this.angle = Math.atan2(targetY - this.y, targetX - this.x);
                
                const baseSpeed = Math.random() * 1.5 + 1;
                this.vx = Math.cos(this.angle) * baseSpeed;
                this.vy = Math.sin(this.angle) * baseSpeed;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if(this.darken > 0) this.darken--;
                if(this.x < -300 || this.x > GAME_WIDTH + 300 || this.y < -300 || this.y > GAME_HEIGHT + 300) {
                    this.init();
                }
            }
            draw() {
                const img = images[this.type.id];
                if(!img || !img.complete) return;
                const natW = img.naturalWidth || img.width;
                const natH = img.naturalHeight || img.height;
                const multiplier = sizeOverrides[this.type.id] ?? 1;
                const targetMax = Math.max(8, (this.type.size || 50) * multiplier);
                const scale = targetMax / Math.max(natW, natH);
                const w = natW * scale;
                const h = natH * scale;
                this.displaySize = Math.max(w, h);
 
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle + Math.PI);
                if(this.darken > 0) ctx.filter = 'brightness(30%) contrast(120%)';
                ctx.drawImage(img, -w/2, -h/2, w, h);
                ctx.restore();
            }
        }
 
        for(let i=0; i < 15; i++) fishes.push(new Fish());
 
        scaler.addEventListener('mousedown', (e) => {
             const rect = scaler.getBoundingClientRect();
             const scale = rect.width / GAME_WIDTH;
             
             const mx = (e.clientX - rect.left) / scale;
             const my = (e.clientY - rect.top) / scale;
             
             if (e.target.closest('.controls, .cannon-node')) return;
 
            const cRect = cannonSprite.getBoundingClientRect();
            const startX = (cRect.left - rect.left) / scale + (cRect.width / 2) / scale;
            const startY = (cRect.top - rect.top) / scale + (cRect.height / 2) / scale;
 
             bullets.push(new Bullet(startX, startY, mx, my));
         });
 
        function changeLevel(d) {
            gearLevel = Math.max(1, Math.min(10, gearLevel + d));
            gearEl.innerText = gearLevel;
        }
 
        function update() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
 
            // Пули
            for(let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.update();
                b.draw();
    
                for(let j = 0; j < fishes.length; j++) {
                    const f = fishes[j];
                    const dist = Math.hypot(b.x - f.x, b.y - f.y);
                    const hitRadius = (f.displaySize || f.size) * 0.4;
                    if(dist < hitRadius) {
                        b.active = false;
                        if(Math.random() < f.type.chance) {
                            const bulletMultiplier = (b.value || selectedAmmo || 1);
                            const reward = f.type.val * bulletMultiplier * gearLevel;
                            score += reward;
                            scoreEl.innerText = score;
                            particles.push({ x: f.x, y: f.y, text: `+${reward}`, life: 60, big: reward >= 30 });
                            f.init();
                        } else {
                            f.darken = 20;
                        }
                        break;
                    }
                }
                if(!b.active) bullets.splice(i, 1);
            }
 
            // Рыбы
            fishes.forEach(f => {
                f.update();
                f.draw();
            });
 
            // Награды
            ctx.textAlign = 'center';
            for(let i = particles.length-1; i>=0; i--) {
                const p = particles[i];
                ctx.fillStyle = `rgba(251, 191, 36, ${p.life/60})`;
                ctx.font = p.big ? 'bold 60px Arial' : 'bold 40px Arial';
                ctx.fillText(p.text, p.x, p.y);
                p.y -= 2;
                p.life--;
                if(p.life <= 0) particles.splice(i, 1);
            }
 
            requestAnimationFrame(update);
        }
 
        update();
    </script>
</body>
</html>
